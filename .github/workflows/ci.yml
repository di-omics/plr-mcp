name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: pip install -e '.[dev]'
      - name: Lint
        run: ruff check plr_mcp tests
      - name: Format check
        run: ruff format --check plr_mcp tests
      - name: Type check
        run: mypy plr_mcp --check-untyped-defs
      - name: Test
        run: pytest -q
